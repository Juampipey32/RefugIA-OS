<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RefugIA OS — Sistema de Supervivencia</title>
    <meta name="description" content="Sistema operativo de supervivencia offline con IA local">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --amber: #ffb000; --amber-dim: #aa7700; --amber-glow: #ffb00040;
            --green: #33ff33; --green-dim: #1a7a1a;
            --bg: #0a0a0a; --bg-panel: #0d0d0d; --bg-input: #111;
            --border: #1a1a1a; --text-dim: #555;
            --danger: #ff4444; --success: #33ff33;
            --font-mono: 'Share Tech Mono', monospace;
            --font-display: 'VT323', monospace;
        }
        html, body { height: 100%; background: var(--bg); color: var(--amber); font-family: var(--font-mono); font-size: 14px; overflow: hidden; }

        /* ===== CRT EFFECT ===== */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px);
        }
        body::after {
            content: ''; position: fixed; inset: 0; z-index: 9998; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
        }
        @keyframes flicker { 0%,97%,100%{opacity:1} 98%{opacity:0.95} 99%{opacity:0.98} }

        /* ===== LAYOUT ===== */
        .app { display: flex; flex-direction: column; height: 100vh; animation: flicker 4s infinite; }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
        }
        .logo { font-family: var(--font-display); font-size: 28px; letter-spacing: 2px; text-shadow: 0 0 10px var(--amber-glow); }
        .logo span { color: var(--green); }
        .status-badge {
            font-size: 11px; padding: 3px 10px; border-radius: 3px;
            border: 1px solid var(--amber-dim); color: var(--amber-dim);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .status-badge.online { border-color: var(--green); color: var(--green); }
        .status-badge.offline { border-color: var(--danger); color: var(--danger); }

        /* ===== TABS (mobile) ===== */
        .tabs {
            display: flex; border-bottom: 1px solid var(--border); background: var(--bg-panel);
        }
        .tab {
            flex: 1; padding: 10px; text-align: center; cursor: pointer;
            border: none; background: transparent; color: var(--text-dim);
            font-family: var(--font-mono); font-size: 13px; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.2s;
        }
        .tab.active { color: var(--amber); border-bottom: 2px solid var(--amber); background: var(--bg); }
        .tab:hover { color: var(--amber-dim); }

        /* ===== PANELS ===== */
        .panels { display: flex; flex: 1; overflow: hidden; }
        .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .panel.hidden { display: none; }
        .panel-header {
            padding: 8px 16px; font-size: 11px; text-transform: uppercase;
            letter-spacing: 2px; color: var(--amber-dim); border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
        }

        /* ===== CHAT ===== */
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px; display: flex;
            flex-direction: column; gap: 12px; scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--amber-dim); border-radius: 2px; }
        .msg {
            max-width: 85%; padding: 10px 14px; border-radius: 4px;
            font-size: 13px; line-height: 1.6; word-wrap: break-word;
            animation: msgIn 0.3s ease;
        }
        @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .msg.user {
            align-self: flex-end; background: #1a1500; border: 1px solid var(--amber-dim);
            color: var(--amber); border-bottom-right-radius: 0;
        }
        .msg.bot {
            align-self: flex-start; background: #001a00; border: 1px solid var(--green-dim);
            color: var(--green); border-bottom-left-radius: 0;
        }
        .msg.system { align-self: center; color: var(--text-dim); font-size: 11px; text-align: center; border: none; background: none; }
        .msg.bot .label, .msg.user .label {
            font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 4px; opacity: 0.6;
        }
        .typing { color: var(--green-dim); font-style: italic; font-size: 12px; padding: 8px 16px; }
        .typing::after { content: '█'; animation: blink 0.8s infinite; }
        @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

        /* ===== CHAT INPUT ===== */
        .chat-input-area {
            display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border);
            background: var(--bg-panel);
        }
        .chat-input-area input {
            flex: 1; background: var(--bg-input); border: 1px solid var(--border);
            color: var(--amber); padding: 10px 14px; font-family: var(--font-mono);
            font-size: 13px; border-radius: 3px; outline: none; transition: border-color 0.2s;
        }
        .chat-input-area input:focus { border-color: var(--amber-dim); }
        .chat-input-area input::placeholder { color: var(--text-dim); }
        .chat-input-area button {
            background: var(--amber); color: var(--bg); border: none; padding: 10px 20px;
            font-family: var(--font-mono); font-size: 13px; cursor: pointer;
            border-radius: 3px; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.2s;
        }
        .chat-input-area button:hover { background: #ffc040; }
        .chat-input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ===== INVENTARIO ===== */
        .inventory-content { flex: 1; overflow-y: auto; padding: 16px; }
        .inv-card {
            border: 1px solid var(--border); border-radius: 4px; padding: 16px;
            margin-bottom: 12px; background: var(--bg-panel); transition: border-color 0.2s;
        }
        .inv-card:hover { border-color: var(--amber-dim); }
        .inv-card h3 { font-family: var(--font-display); font-size: 22px; margin-bottom: 4px; }
        .inv-card .value {
            font-size: 36px; font-family: var(--font-display); color: var(--green);
            text-shadow: 0 0 8px rgba(51,255,51,0.3); margin: 8px 0;
        }
        .inv-card .unit { font-size: 14px; color: var(--amber-dim); }
        .inv-card .bar-bg {
            height: 6px; background: var(--border); border-radius: 3px;
            margin: 8px 0; overflow: hidden;
        }
        .inv-card .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
        .inv-card .bar-fill.green { background: var(--green); }
        .inv-card .bar-fill.amber { background: var(--amber); }
        .inv-card .bar-fill.red { background: var(--danger); }
        .inv-controls { display: flex; gap: 6px; margin-top: 10px; }
        .inv-controls button {
            flex: 1; padding: 8px; border: 1px solid var(--border); background: transparent;
            color: var(--amber); font-family: var(--font-mono); font-size: 12px;
            cursor: pointer; border-radius: 3px; transition: all 0.2s;
        }
        .inv-controls button:hover { border-color: var(--amber); background: #1a1500; }
        .inv-controls input {
            width: 70px; text-align: center; background: var(--bg-input);
            border: 1px solid var(--border); color: var(--amber);
            font-family: var(--font-mono); font-size: 13px; border-radius: 3px; padding: 4px;
        }
        .inv-log { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }
        .inv-log h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--amber-dim); margin-bottom: 8px; }
        .inv-log-entry { font-size: 11px; color: var(--text-dim); padding: 3px 0; border-bottom: 1px solid #111; }
        .inv-log-entry .time { color: var(--amber-dim); }

        /* ===== DIVIDER (desktop) ===== */
        .divider { width: 1px; background: var(--border); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .divider { display: none; }
            .tabs { display: flex; }
        }
        @media (min-width: 769px) {
            .tabs { display: none; }
            .panel.hidden { display: flex !important; }
            .panels { flex-direction: row; }
            .panel { flex: 1; }
        }

        /* ===== BOOT SEQUENCE ===== */
        .boot-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 12px; padding: 32px;
            transition: opacity 0.5s;
        }
        .boot-overlay.hidden { opacity: 0; pointer-events: none; }
        .boot-text { font-family: var(--font-display); font-size: 16px; color: var(--green); text-align: left; width: 100%; max-width: 500px; }
        .boot-text .line { opacity: 0; animation: bootLine 0.1s forwards; }
        @keyframes bootLine { to { opacity: 1; } }
    </style>
</head>
<body>
    <!-- BOOT SEQUENCE -->
    <div class="boot-overlay" id="bootOverlay">
        <div class="boot-text" id="bootText"></div>
    </div>

    <!-- APP -->
    <div class="app" id="app" style="display:none">
        <header class="header">
            <div class="logo">REFUG<span>IA</span> OS</div>
            <div class="status-badge" id="statusBadge">OFFLINE</div>
        </header>
        <nav class="tabs">
            <button class="tab active" id="tabChat" onclick="switchTab('chat')">💬 Chat IA</button>
            <button class="tab" id="tabInv" onclick="switchTab('inv')">📦 Inventario</button>
        </nav>
        <main class="panels">
            <!-- CHAT PANEL -->
            <section class="panel" id="panelChat">
                <div class="panel-header">Terminal de Consulta — RefugIA Agent</div>
                <div class="chat-messages" id="chatMessages">
                    <div class="msg system">Sistema inicializado. Escribe tu consulta de supervivencia.</div>
                </div>
                <div class="typing" id="typingIndicator" style="display:none">RefugIA procesando</div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Escribe tu pregunta..." autocomplete="off" />
                    <button id="sendBtn" onclick="enviarMensaje()">Enviar</button>
                </div>
            </section>
            <div class="divider"></div>
            <!-- INVENTARIO PANEL -->
            <section class="panel hidden" id="panelInv">
                <div class="panel-header">Control de Raciones</div>
                <div class="inventory-content">
                    <div class="inv-card" id="cardAgua">
                        <h3>💧 Agua Potable</h3>
                        <div class="value" id="aguaVal">0</div>
                        <div class="unit">litros disponibles</div>
                        <div class="bar-bg"><div class="bar-fill green" id="aguaBar" style="width:0%"></div></div>
                        <div class="inv-controls">
                            <button onclick="modInventario('agua', -1)">− 1L</button>
                            <input type="number" id="aguaInput" value="1" min="0.1" step="0.5">
                            <button onclick="modInventario('agua', 1)">+ 1L</button>
                        </div>
                    </div>
                    <div class="inv-card" id="cardComida">
                        <h3>🍖 Comida</h3>
                        <div class="value" id="comidaVal">0</div>
                        <div class="unit">Kcal almacenadas</div>
                        <div class="bar-bg"><div class="bar-fill amber" id="comidaBar" style="width:0%"></div></div>
                        <div class="inv-controls">
                            <button onclick="modInventario('comida', -100)">− 100</button>
                            <input type="number" id="comidaInput" value="100" min="10" step="50">
                            <button onclick="modInventario('comida', 100)">+ 100</button>
                        </div>
                    </div>
                    <div class="inv-log" id="invLog">
                        <h4>📋 Registro de Movimientos</h4>
                    </div>
                </div>
            </section>
        </main>
    </div>

<script>
// ============================================================
//  RefugIA OS — Frontend Logic
// ============================================================

const API_URL = 'http://127.0.0.1:8000';
let backendOnline = false;

// --- Respuestas de simulación (cuando el backend no responde) ---
const RESPUESTAS_SIM = {
    agua: "🔵 MODO SIMULACIÓN: Para purificar agua: 1) Filtra con tela para quitar partículas. 2) Hierve durante 1 minuto a nivel del mar (3 min en altitud). 3) Deja enfriar en recipiente limpio. Si no puedes hervir, usa 2 gotas de lejía por litro y espera 30 min.",
    herida: "🔴 MODO SIMULACIÓN: Primeros auxilios para heridas: 1) Lava con agua limpia abundante. 2) Aplica presión directa con tela limpia si sangra. 3) No retires objetos incrustados. 4) Cubre con vendaje limpio. 5) Cambia el vendaje cada 24h vigilando infección.",
    frio: "🧊 MODO SIMULACIÓN: Protección contra hipotermia: 1) Busca refugio del viento INMEDIATAMENTE. 2) Quita ropa mojada. 3) Aísla del suelo con hojas/cartón. 4) Calienta el torso primero (axilas, cuello). 5) Bebidas tibias si está consciente. NUNCA alcohol.",
    fuego: "🔥 MODO SIMULACIÓN: Para hacer fuego: 1) Reúne yesca (hierba seca, corteza, algodón). 2) Prepara leña fina como lápices. 3) Prepara leña gruesa. 4) Usa pedernal, lupa o batería. 5) Sopla suavemente la brasa. Protege del viento.",
    default: "⚠️ MODO SIMULACIÓN: El backend de RefugIA no está disponible. Inicia el servidor con: python src/agente_api.py\n\nPalabras clave disponibles: agua, herida, frío, fuego."
};

// ============================================================
//  BOOT SEQUENCE
// ============================================================
const BOOT_LINES = [
    "RefugIA OS v1.0.0 — Boot Sequence",
    "Verificando hardware... OK",
    "Iniciando kernel de supervivencia...",
    "Cargando módulos: [RAG] [LLM] [VectorDB]",
    "Conectando a Ollama LLM...",
    "Inicializando interfaz de usuario...",
    "=========================================",
    "  SISTEMA OPERATIVO DE SUPERVIVENCIA",
    "  Estado: OPERATIVO",
    "=========================================",
];

async function bootSequence() {
    const container = document.getElementById('bootText');
    for (let i = 0; i < BOOT_LINES.length; i++) {
        const div = document.createElement('div');
        div.className = 'line';
        div.style.animationDelay = `${i * 0.1}s`;
        div.textContent = '> ' + BOOT_LINES[i];
        container.appendChild(div);
        await sleep(180);
    }
    await sleep(600);
    document.getElementById('bootOverlay').classList.add('hidden');
    document.getElementById('app').style.display = 'flex';
    checkBackend();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============================================================
//  TABS
// ============================================================
function switchTab(tab) {
    document.getElementById('tabChat').classList.toggle('active', tab === 'chat');
    document.getElementById('tabInv').classList.toggle('active', tab === 'inv');
    document.getElementById('panelChat').classList.toggle('hidden', tab !== 'chat');
    document.getElementById('panelInv').classList.toggle('hidden', tab !== 'inv');
}

// ============================================================
//  CHAT
// ============================================================
function addMessage(text, type) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    const label = type === 'user' ? 'Tú' : 'RefugIA';
    if (type !== 'system') {
        div.innerHTML = `<div class="label">${label}</div>${escapeHtml(text).replace(/\n/g, '<br>')}`;
    } else {
        div.textContent = text;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function escapeHtml(t) {
    const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
}

function getSimResponse(query) {
    const q = query.toLowerCase();
    if (q.includes('agua') || q.includes('beber') || q.includes('purificar')) return RESPUESTAS_SIM.agua;
    if (q.includes('herida') || q.includes('sangr') || q.includes('corte') || q.includes('curar')) return RESPUESTAS_SIM.herida;
    if (q.includes('frio') || q.includes('frío') || q.includes('hipotermia') || q.includes('calor')) return RESPUESTAS_SIM.frio;
    if (q.includes('fuego') || q.includes('llama') || q.includes('encender') || q.includes('fogata')) return RESPUESTAS_SIM.fuego;
    return RESPUESTAS_SIM.default;
}

async function enviarMensaje() {
    const input = document.getElementById('chatInput');
    const query = input.value.trim();
    if (!query) return;

    addMessage(query, 'user');
    input.value = '';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('typingIndicator').style.display = 'block';

    try {
        const resp = await fetch(`${API_URL}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        addMessage(data.respuesta, 'bot');
    } catch (err) {
        // Modo simulación cuando el backend no responde
        addMessage(getSimResponse(query), 'bot');
    } finally {
        document.getElementById('typingIndicator').style.display = 'none';
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('chatInput').focus();
    }
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('chatInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') enviarMensaje();
    });
});

// ============================================================
//  BACKEND STATUS CHECK
// ============================================================
async function checkBackend() {
    const badge = document.getElementById('statusBadge');
    try {
        const r = await fetch(`${API_URL}/api/status`);
        if (r.ok) {
            const d = await r.json();
            backendOnline = true;
            badge.textContent = d.modo === 'rag' ? 'RAG ACTIVO' : 'DEGRADADO';
            badge.className = 'status-badge ' + (d.modo === 'rag' ? 'online' : 'offline');
        } else throw new Error();
    } catch {
        backendOnline = false;
        badge.textContent = 'SIMULACIÓN';
        badge.className = 'status-badge offline';
    }
}
setInterval(checkBackend, 15000);

// ============================================================
//  INVENTARIO
// ============================================================
const AGUA_MAX = 50; // litros
const COMIDA_MAX = 10000; // Kcal

function loadInventario() {
    return {
        agua: parseFloat(localStorage.getItem('refugia_agua') || '0'),
        comida: parseFloat(localStorage.getItem('refugia_comida') || '0'),
        log: JSON.parse(localStorage.getItem('refugia_inv_log') || '[]'),
    };
}

function saveInventario(inv) {
    localStorage.setItem('refugia_agua', inv.agua.toString());
    localStorage.setItem('refugia_comida', inv.comida.toString());
    localStorage.setItem('refugia_inv_log', JSON.stringify(inv.log.slice(-20)));
}

function renderInventario() {
    const inv = loadInventario();
    document.getElementById('aguaVal').textContent = inv.agua.toFixed(1);
    document.getElementById('comidaVal').textContent = Math.round(inv.comida);

    const aguaPct = Math.min((inv.agua / AGUA_MAX) * 100, 100);
    const comidaPct = Math.min((inv.comida / COMIDA_MAX) * 100, 100);
    const aguaBar = document.getElementById('aguaBar');
    const comidaBar = document.getElementById('comidaBar');
    aguaBar.style.width = aguaPct + '%';
    comidaBar.style.width = comidaPct + '%';

    aguaBar.className = 'bar-fill ' + (aguaPct > 40 ? 'green' : aguaPct > 15 ? 'amber' : 'red');
    comidaBar.className = 'bar-fill ' + (comidaPct > 40 ? 'green' : comidaPct > 15 ? 'amber' : 'red');

    // Render log
    const logContainer = document.getElementById('invLog');
    const logHtml = inv.log.slice().reverse().map(e =>
        `<div class="inv-log-entry"><span class="time">[${e.time}]</span> ${e.text}</div>`
    ).join('');
    logContainer.innerHTML = '<h4>📋 Registro de Movimientos</h4>' + logHtml;
}

function modInventario(tipo, delta) {
    const inv = loadInventario();
    const inputId = tipo === 'agua' ? 'aguaInput' : 'comidaInput';
    const customVal = parseFloat(document.getElementById(inputId).value) || Math.abs(delta);
    const realDelta = delta > 0 ? customVal : -customVal;

    inv[tipo] = Math.max(0, inv[tipo] + realDelta);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    const unit = tipo === 'agua' ? 'L' : 'Kcal';
    const sign = realDelta >= 0 ? '+' : '';
    inv.log.push({ time: timeStr, text: `${tipo.toUpperCase()}: ${sign}${realDelta}${unit} → ${inv[tipo].toFixed(1)}${unit}` });

    saveInventario(inv);
    renderInventario();
}

// Init
document.addEventListener('DOMContentLoaded', renderInventario);

// ============================================================
//  BOOT
// ============================================================
window.addEventListener('load', bootSequence);
</script>
</body>
</html>
