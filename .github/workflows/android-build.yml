name: Build Android APK (RefugIA)

# Compila el APK de debug de la app móvil en la nube (no necesitás Android
# SDK local). El APK queda como artefacto descargable en cada corrida.
on:
  push:
    branches: ["**"]
    paths:
      - "mobile/android-app/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

defaults:
  run:
    working-directory: mobile/android-app

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # evita que un build colgado quede corriendo indefinido
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android-app/**/*.gradle*', 'mobile/android-app/gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Crear .env (placeholder para el plugin secrets)
        run: cp .env.example .env

      - name: Decodificar debug.keystore
        run: base64 -d debug.keystore.base64 > debug.keystore

      - name: Generar Gradle wrapper si falta
        run: |
          # AGP 9.1.1 (generado por AI Studio) requiere Gradle 9.3.1+
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 9.3.1
          fi
          chmod +x gradlew

      # --no-daemon y --no-configuration-cache evitan cuelgues en CI; el
      # configuration-cache de gradle.properties no aporta en un runner efímero.
      - name: Compilar APK de debug
        run: ./gradlew :app:assembleDebug --no-daemon --no-configuration-cache --stacktrace

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: refugia-debug-apk
          path: mobile/android-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
